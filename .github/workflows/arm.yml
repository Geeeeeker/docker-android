      - name: 启动 QEMU 虚拟机
        run: |
          cd ~/lineage-images
          qemu-system-aarch64 \
            -M virt \
            -cpu max \
            -m 4096 \
            -smp 4 \
            -drive file=system.qcow2,format=qcow2,if=virtio,index=0 \
            -drive file=data.qcow2,format=qcow2,if=virtio,index=1 \
            -nic user,hostfwd=tcp::5555-:5555 \
            -vnc :0 \
            -daemonize

          echo "QEMU 已启动，等待系统初始化 (180s) ..."
          sleep 180

          # 确认端口
          sudo ss -tlnp | grep -E '5555|5900'
