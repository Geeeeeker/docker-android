      - name: 启动 QEMU（复制 UEFI 变量文件到工作目录）
        run: |
          cd ~/lineage-images
          # 复制 AAVMF_VARS.fd 到本地，赋予写权限
          cp /usr/share/AAVMF/AAVMF_VARS.fd my_vars.fd
          chmod 666 my_vars.fd
          qemu-system-aarch64 \
            -M virt \
            -cpu max \
            -m 4096 \
            -smp 4 \
            -drive if=pflash,format=raw,file=/usr/share/AAVMF/AAVMF_CODE.fd,readonly=on \
            -drive if=pflash,format=raw,file=my_vars.fd \
            -drive file=system.qcow2,format=qcow2,if=virtio,index=0 \
            -drive file=data.qcow2,format=qcow2,if=virtio,index=1 \
            -nic user,hostfwd=tcp::5555-:5555 \
            -vnc :0 \
            -daemonize
          echo "QEMU 已启动，等待 Android 启动（180s）..."
          sleep 180
