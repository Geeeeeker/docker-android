name: ARM64 Android 云手机 (macOS 稳定版)

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: macos-14        # Apple Silicon, emulator 二进制可用
    timeout-minutes: 360

    steps:
      - name: 安装 Java
        run: |
          brew install openjdk@17
          sudo ln -sfn $(brew --prefix)/opt/openjdk@17/libexec/openjdk.jdk /Library/Java/JavaVirtualMachines/openjdk-17.jdk
          echo "JAVA_HOME=$(brew --prefix)/opt/openjdk@17" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH

      - name: 安装 Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "system-images;android-34;google_apis;arm64-v8a" "emulator" "platform-tools"
          
          echo "$ANDROID_SDK_ROOT/emulator" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: 创建 AVD 并启动模拟器 (关闭硬件加速)
        run: |
          echo "no" | avdmanager create avd -n test -k "system-images;android-34;google_apis;arm64-v8a" -d pixel_4
          
          echo "启动模拟器 (纯软件模拟)..."
          $ANDROID_SDK_ROOT/emulator/emulator -avd test \
            -no-window -no-audio -no-boot-anim \
            -netdelay none -netspeed full \
            -gpu swiftshader_indirect \
            -accel off \                # 关键：强制关闭硬件加速，避免 HVF 错误
            -port 5554 &
          
          for i in {1..360}; do
            if $ANDROID_SDK_ROOT/platform-tools/adb -s emulator-5554 shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; then
              echo "模拟器启动成功！"
              break
            fi
            echo "等待中... ($i 次尝试)"
            sleep 5
          done
          
          $ANDROID_SDK_ROOT/platform-tools/adb -s emulator-5554 wait-for-device
          echo "ADB 已连接"

      - name: 配置 VNC + noVNC + Cloudflared 远程访问
        run: |
          # scrcpy 生成 VNC
          brew install scrcpy
          scrcpy --vnc --vnc-addr=0.0.0.0:5900 --no-audio --no-window &
          sleep 5
          
          # noVNC 网页桌面
          brew install novnc
          pip3 install websockify
          websockify --web $(brew --prefix)/share/novnc 6080 localhost:5900 &
          sleep 3
          
          # cloudflared 隧道
          curl -L -o cloudflared.pkg https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64.pkg
          sudo installer -pkg cloudflared.pkg -target /
          
          cloudflared tunnel --url tcp://localhost:5555 > adb-tunnel.log 2>&1 &
          cloudflared tunnel --url http://localhost:6080 > vnc-tunnel.log 2>&1 &
          sleep 15
          
          ADB_HOST=$(grep -oP 'trycloudflare\.com\S+' adb-tunnel.log | head -1)
          VNC_HOST=$(grep -oP '(?<=https://)[^ ]+\.trycloudflare\.com' vnc-tunnel.log | head -1)
          
          echo "=========================================="
          if [ -n "$ADB_HOST" ]; then
            echo "📱 ADB 连接: adb connect ${ADB_HOST}:443"
          else
            echo "❌ ADB 隧道失败，日志："; cat adb-tunnel.log
          fi
          if [ -n "$VNC_HOST" ]; then
            echo "🌐 浏览器桌面: https://${VNC_HOST}"
          else
            echo "❌ 桌面隧道失败，日志："; cat vnc-tunnel.log
          fi
          echo "=========================================="
          
          sleep 21600
