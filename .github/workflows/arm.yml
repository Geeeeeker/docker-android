name: macOS ARM QEMU LineageOS (原生 ARM 加速)

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: macos-14          # Apple Silicon，原生 ARM64
    timeout-minutes: 360

    steps:
      - name: 安装 QEMU 和依赖
        run: |
          brew install qemu novnc python3
          pip3 install websockify

      - name: 下载并准备 LineageOS 镜像
        run: |
          mkdir -p ~/lineage-images && cd ~/lineage-images
          wget -q https://github.com/jqssun/android-lineage-qemu/releases/download/v2026.03.18/UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          unzip -q UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          DATA_DIR=$(find . -type d -name "Data" | head -1)
          cp $DATA_DIR/vda.qcow2 system.qcow2
          cp $DATA_DIR/vdb.qcow2 data.qcow2

          # 复制 UEFI 变量文件并扩至 64MB
          cp $DATA_DIR/efi_vars.fd my_vars.fd
          truncate -s 64M my_vars.fd

          echo "镜像就绪："
          ls -lh system.qcow2 data.qcow2 my_vars.fd

      - name: 启动 QEMU（HVF 加速 + UEFI 引导）
        run: |
          cd ~/lineage-images
          qemu-system-aarch64 \
            -M virt,accel=hvf \
            -cpu host \
            -m 4096 \
            -smp 4 \
            -drive if=pflash,format=raw,file=/opt/homebrew/share/qemu/edk2-aarch64-code.fd,readonly=on \
            -drive if=pflash,format=raw,file=my_vars.fd \
            -drive file=system.qcow2,format=qcow2,if=virtio,index=0 \
            -drive file=data.qcow2,format=qcow2,if=virtio,index=1 \
            -nic user,hostfwd=tcp::5555-:5555 \
            -vnc :0 \
            -daemonize

          echo "QEMU 已启动，等待系统启动 (120s)..."
          sleep 120

      - name: 建立 noVNC 与隧道
        run: |
          # noVNC 将 VNC 转为浏览器可用
          websockify --web $(brew --prefix)/share/novnc 6080 localhost:5900 &
          # 安装 cloudflared
          curl -L -o cloudflared.pkg https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64.pkg
          sudo installer -pkg cloudflared.pkg -target /
          # 隧道
          nohup cloudflared tunnel --url tcp://localhost:5555 > adb-tunnel.log 2>&1 &
          nohup cloudflared tunnel --url http://localhost:6080 > novnc-tunnel.log 2>&1 &
          sleep 20

          ADB_HOST=$(grep -oP 'https?://\K[^\s]+\.trycloudflare\.com' adb-tunnel.log | head -1)
          NOVNC_HOST=$(grep -oP 'https?://\K[^\s]+\.trycloudflare\.com' novnc-tunnel.log | head -1)

          echo "=========================================="
          echo "📱 ADB 连接：  adb connect ${ADB_HOST}:443"
          echo "🌐 浏览器桌面： https://${NOVNC_HOST}"
          echo "=========================================="
          echo "实例保持运行 6 小时"
          sleep 21600
