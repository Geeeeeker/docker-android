name: QEMU LineageOS 云手机 (修复镜像路径)

on:
  workflow_dispatch:

jobs:
  qemu-android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 安装 QEMU 和依赖
        run: |
          sudo apt update
          sudo apt install -y qemu-system-arm qemu-utils unzip wget

      - name: 下载并解压 LineageOS 镜像
        run: |
          mkdir -p ~/lineage-images
          cd ~/lineage-images
          wget -q https://github.com/jqssun/android-lineage-qemu/releases/download/v2026.03.18/UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          unzip -q UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          
          echo "解压后的文件列表："
          find . -type f

          # 定位 Data 目录下的 qcow2 镜像
          DATA_DIR=$(find . -type d -name "Data" | head -1)
          if [ -z "$DATA_DIR" ]; then
            echo "❌ 未找到 Data 目录"
            exit 1
          fi

          VDA=$(find $DATA_DIR -type f -name "vda.qcow2" | head -1)
          VDB=$(find $DATA_DIR -type f -name "vdb.qcow2" | head -1)
          
          if [ -z "$VDA" ]; then
            echo "❌ 未找到 vda.qcow2"
            exit 1
          fi

          cp "$VDA" system.qcow2
          cp "$VDB" data.qcow2
          
          echo "VDA=$(realpath system.qcow2)" >> $GITHUB_ENV
          echo "VDB=$(realpath data.qcow2)" >> $GITHUB_ENV
          
          echo "镜像已就绪："
          ls -lh system.qcow2 data.qcow2

      - name: 启动 QEMU 虚拟机
        run: |
          qemu-system-aarch64 \
            -M virt \
            -cpu max \
            -m 4096 \
            -smp 4 \
            -drive file=system.qcow2,format=qcow2,if=virtio,index=0 \
            -drive file=data.qcow2,format=qcow2,if=virtio,index=1 \
            -nic user,hostfwd=tcp::5555-:5555 \
            -vnc :0 \
            -daemonize

          echo "QEMU 已启动，等待系统初始化 (180s) ..."
          sleep 180
          
          # 确认端口
          sudo ss -tlnp | grep -E '5555|5900'

      - name: 安装 cloudflared 并建立隧道
        run: |
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          nohup cloudflared tunnel --url tcp://localhost:5555 > adb-tunnel.log 2>&1 &
          nohup cloudflared tunnel --url tcp://localhost:5900 > vnc-tunnel.log 2>&1 &
          sleep 20

          echo "===== ADB 隧道日志 ====="
          cat adb-tunnel.log
          echo "===== VNC 隧道日志 ====="
          cat vnc-tunnel.log

          # 提取完整域名
          ADB_HOST=$(grep -oP 'https?://\K[^\s]+\.trycloudflare\.com' adb-tunnel.log | head -1)
          VNC_HOST=$(grep -oP 'https?://\K[^\s]+\.trycloudflare\.com' vnc-tunnel.log | head -1)

          if [ -n "$ADB_HOST" ]; then
            echo "📱 ADB 连接: adb connect ${ADB_HOST}:443"
          else
            echo "❌ ADB 隧道域名未找到"
          fi

          if [ -n "$VNC_HOST" ]; then
            echo "🖥️  VNC 地址: ${VNC_HOST}:443 (无密码)"
          else
            echo "❌ VNC 隧道域名未找到"
          fi

          echo "=========================================="
          echo "实例保持运行 6 小时"
          sleep 21600
