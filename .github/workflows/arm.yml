name: QEMU LineageOS 云手机 (ARM64 + VNC + ADB)

on:
  workflow_dispatch:

jobs:
  qemu-android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 安装 QEMU 和依赖
        run: |
          sudo apt update
          sudo apt install -y qemu-system-arm qemu-utils unzip wget

      - name: 下载并解压 LineageOS 镜像
        run: |
          mkdir -p ~/lineage-images
          cd ~/lineage-images
          wget -q https://github.com/jqssun/android-lineage-qemu/releases/download/v2026.03.18/UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          unzip -q UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          
          echo "解压后的文件/目录："
          ls -1

          # 进入 UTM 包目录查找镜像（递归）
          # 常见路径：LineageOS_on_arm64.utm/Images/disk.img 或 root.qcow2
          IMAGE_DIR=$(find . -type d -name "Images" | head -1)
          if [ -d "$IMAGE_DIR" ]; then
            MAIN_IMG=$(find $IMAGE_DIR -type f \( -name "*.img" -o -name "*.qcow2" \) | head -1)
          fi
          
          if [ -z "$MAIN_IMG" ]; then
            echo "❌ 未找到磁盘镜像，请检查包结构：" 
            find . -type f
            exit 1
          fi

          echo "找到主镜像：$MAIN_IMG"
          cp "$MAIN_IMG" system.img
          echo "MAIN_IMG=system.img" >> $GITHUB_ENV

      - name: 启动 QEMU 虚拟机
        run: |
          cd ~/lineage-images
          echo "使用镜像：${{ env.MAIN_IMG }}"
          qemu-system-aarch64 \
            -M virt \
            -cpu max \
            -m 4096 \
            -smp 4 \
            -drive file=system.img,format=raw,if=virtio \
            -nic user,hostfwd=tcp::5555-:5555 \
            -vnc :0 \
            -daemonize

          echo "QEMU 已启动，等待系统初始化 (180s) ..."
          sleep 180
          sudo ss -tlnp | grep -E '5555|5900'

      - name: 安装 cloudflared 并建立隧道
        run: |
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          nohup cloudflared tunnel --url tcp://localhost:5555 > adb-tunnel.log 2>&1 &
          nohup cloudflared tunnel --url tcp://localhost:5900 > vnc-tunnel.log 2>&1 &
          sleep 20

          echo "===== 隧道日志 ====="
          cat adb-tunnel.log
          cat vnc-tunnel.log

          # 提取完整域名（例如 https://xxxxx.trycloudflare.com）
          ADB_HOST=$(grep -oP 'https?://\K[^\s]+\.trycloudflare\.com' adb-tunnel.log | head -1)
          VNC_HOST=$(grep -oP 'https?://\K[^\s]+\.trycloudflare\.com' vnc-tunnel.log | head -1)

          if [ -n "$ADB_HOST" ]; then
            echo "📱 ADB 连接命令: adb connect ${ADB_HOST}:443"
          else
            echo "❌ ADB 隧道域名提取失败"
          fi

          if [ -n "$VNC_HOST" ]; then
            echo "🖥️  VNC 连接地址: ${VNC_HOST}:443 (无密码)"
          else
            echo "❌ VNC 隧道域名提取失败"
          fi

          echo "=========================================="
          echo "实例保持运行 6 小时"
          sleep 21600
