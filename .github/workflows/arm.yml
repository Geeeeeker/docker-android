name: QEMU LineageOS 云手机 (ARM64 + VNC + ADB)

on:
  workflow_dispatch:

jobs:
  qemu-android:
    runs-on: ubuntu-latest      # 使用 x86_64 主机，通过 QEMU 模拟 ARM64
    timeout-minutes: 360

    steps:
      - name: 安装 QEMU 和依赖
        run: |
          sudo apt update
          sudo apt install -y qemu-system-arm qemu-utils unzip wget

      - name: 下载 LineageOS 镜像
        run: |
          mkdir -p ~/lineage-images
          cd ~/lineage-images
          # 下载主镜像
          wget -q https://github.com/jqssun/android-lineage-qemu/releases/download/v2026.03.18/UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          unzip -q UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          # 下载 boot 和 recovery 镜像（可选，备用）
          wget -q https://github.com/jqssun/android-lineage-qemu/releases/download/v2026.03.18/boot.img
          wget -q https://github.com/jqssun/android-lineage-qemu/releases/download/v2026.03.18/recovery-userdebug.img

      - name: 启动 QEMU 虚拟机
        run: |
          IMAGE_DIR=~/lineage-images
          # 查找解压后的主镜像文件（通常为 .img 或 .qcow2）
          MAIN_IMG=$(find $IMAGE_DIR -maxdepth 1 \( -name "*.img" -o -name "*.qcow2" \) | head -1)
          echo "Using image: $MAIN_IMG"

          # QEMU 参数说明：
          # -M virt: 使用 virt 机器类型（通用 ARM64 虚拟机）
          # -cpu max: 使用最大特性集的 CPU
          # -m 4096: 分配 4GB 内存
          # -smp 4: 分配 4 个 CPU 核心
          # -nic user,hostfwd=tcp::5555-:5555: 将宿主机的 5555 端口转发到虚拟机的 5555（ADB）
          # -vnc :0: 开启 VNC 服务，监听在本地 5900 端口
          # -daemonize: 后台运行
          qemu-system-aarch64 \
            -M virt \
            -cpu max \
            -m 4096 \
            -smp 4 \
            -drive file=$MAIN_IMG,format=raw,if=virtio \
            -nic user,hostfwd=tcp::5555-:5555 \
            -vnc :0 \
            -daemonize

          echo "QEMU 已启动，等待 Android 系统初始化 (180s) ..."
          sleep 180

          # 检查 ADB 端口是否已监听
          echo "宿主机端口监听状态："
          sudo ss -tlnp | grep -E '5555|5900'

      - name: 安装并启动 Cloudflared 隧道
        run: |
          # 下载 cloudflared（amd64 版本）
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          # 启动 ADB 隧道（TCP）
          nohup cloudflared tunnel --url tcp://localhost:5555 > adb-tunnel.log 2>&1 &
          # 启动 VNC 隧道（TCP）
          nohup cloudflared tunnel --url tcp://localhost:5900 > vnc-tunnel.log 2>&1 &

          echo "等待 Cloudflared 建立隧道 (20s) ..."
          sleep 20

          # 提取公网域名
          ADB_HOST=$(grep -oP 'trycloudflare\.com\S+' adb-tunnel.log | head -1)
          VNC_HOST=$(grep -oP 'trycloudflare\.com\S+' vnc-tunnel.log | head -1)

          echo "=========================================="
          if [ -n "$ADB_HOST" ]; then
            echo "📱 ADB 连接命令: adb connect ${ADB_HOST}:443"
          else
            echo "❌ ADB 隧道失败，查看 adb-tunnel.log："
            cat adb-tunnel.log
          fi

          if [ -n "$VNC_HOST" ]; then
            echo "🖥️  VNC 连接地址: ${VNC_HOST}:443 (无密码)"
            echo "   您可以使用 VNC 客户端连接，或通过 noVNC 网页代理访问。"
          else
            echo "❌ VNC 隧道失败，查看 vnc-tunnel.log："
            cat vnc-tunnel.log
          fi
          echo "=========================================="
          echo "实例将保持运行 6 小时，请尽快使用。"

          # 保持容器存活
          sleep 21600
