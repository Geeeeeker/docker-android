name: ARM64 Android 云手机 (Linux ARM)

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-22.04-arm   # 真·ARM 硬件，KVM 可用
    timeout-minutes: 360

    steps:
      - name: 开启 KVM 权限
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger
          sudo chmod 666 /dev/kvm

      - name: 运行 ARM64 模拟器并配置远程桌面
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: arm64-v8a
          target: google_apis
          profile: pixel_4
          disable-linux-hw-accel: false   # 启用 KVM
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -no-audio
            -no-boot-anim
            -netdelay none
            -netspeed full
            -qemu -vnc :0
          script: |
            echo "模拟器已启动，VNC 在 5900 端口"

            # 等待设备完全启动
            adb wait-for-device

            # 1. 安装 noVNC + websockify
            sudo apt update
            sudo apt install -y novnc websockify python3-websockify

            # 2. 启动 noVNC（将 VNC 5900 转成浏览器可访问的 HTTP 6080）
            websockify --web /usr/share/novnc 6080 localhost:5900 &
            sleep 3

            # 3. 安装 cloudflared (ARM64 版)
            curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
            chmod +x cloudflared
            sudo mv cloudflared /usr/local/bin/

            # 4. 启动两条隧道
            nohup cloudflared tunnel --url tcp://localhost:5555 > adb-tunnel.log 2>&1 &
            nohup cloudflared tunnel --url http://localhost:6080 > vnc-tunnel.log 2>&1 &
            sleep 15

            # 5. 提取公网域名
            ADB_HOST=$(grep -oP 'trycloudflare\.com\S+' adb-tunnel.log | head -1)
            VNC_HOST=$(grep -oP '(?<=https://)[^ ]+\.trycloudflare\.com' vnc-tunnel.log | head -1)

            echo "=========================================="
            if [ -n "$ADB_HOST" ]; then
              echo "📱 ADB 连接命令: adb connect ${ADB_HOST}:443"
            else
              echo "❌ ADB 隧道失败，查看 adb-tunnel.log："
              cat adb-tunnel.log
            fi
            if [ -n "$VNC_HOST" ]; then
              echo "🌐 浏览器桌面地址: https://${VNC_HOST}"
            else
              echo "❌ 桌面隧道失败，查看 vnc-tunnel.log："
              cat vnc-tunnel.log
            fi
            echo "=========================================="
            echo "实例将保持运行 6 小时，请尽快使用。"

            # 保持活跃
            sleep 21600
