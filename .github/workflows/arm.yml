name: QEMU LineageOS 云手机 (ARM64 + VNC + ADB)

on:
  workflow_dispatch:

jobs:
  qemu-android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 安装 QEMU 和依赖
        run: |
          sudo apt update
          sudo apt install -y qemu-system-arm qemu-utils unzip wget

      - name: 下载并解压 LineageOS 镜像
        run: |
          mkdir -p ~/lineage-images
          cd ~/lineage-images

          # 下载主镜像压缩包
          wget -q https://github.com/jqssun/android-lineage-qemu/releases/download/v2026.03.18/UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          unzip -q UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          
          # 列出解压后的文件（便于调试）
          echo "解压后的文件列表："
          ls -1

          # 选择主镜像（排除 recovery、boot，通常文件名包含 'lineage' 或 'virtio'）
          # 这里手动指定已知的文件名，或者用逻辑：取最大的 .img 文件
          MAIN_IMG=$(ls -1S *.img | grep -v -E 'recovery|boot' | head -1)
          if [ -z "$MAIN_IMG" ]; then
            # 如果没有 .img，尝试 .qcow2
            MAIN_IMG=$(ls -1S *.qcow2 | head -1)
          fi
          echo "MAIN_IMG=$MAIN_IMG" >> $GITHUB_ENV
          echo "主镜像文件：$MAIN_IMG"

          # 下载备用 boot 和 recovery（非必须）
          wget -q https://github.com/jqssun/android-lineage-qemu/releases/download/v2026.03.18/boot.img
          wget -q https://github.com/jqssun/android-lineage-qemu/releases/download/v2026.03.18/recovery-userdebug.img

      - name: 启动 QEMU 虚拟机
        run: |
          cd ~/lineage-images
          echo "使用镜像：${{ env.MAIN_IMG }}"

          # 赋予主镜像正确名称（避免文件名中有空格或特殊字符）
          cp "${{ env.MAIN_IMG }}" system.img

          # 启动 QEMU，使用用户模式网络，转发 ADB 5555，开启 VNC 5900
          qemu-system-aarch64 \
            -M virt \
            -cpu max \
            -m 4096 \
            -smp 4 \
            -drive file=system.img,format=raw,if=virtio \
            -nic user,hostfwd=tcp::5555-:5555 \
            -vnc :0 \
            -daemonize

          echo "QEMU 已启动，等待系统初始化 (180s) ..."
          sleep 180

          # 确认端口
          sudo ss -tlnp | grep -E '5555|5900'

      - name: 安装 cloudflared 并建立隧道
        run: |
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          # 启动隧道
          nohup cloudflared tunnel --url tcp://localhost:5555 > adb-tunnel.log 2>&1 &
          nohup cloudflared tunnel --url tcp://localhost:5900 > vnc-tunnel.log 2>&1 &

          echo "等待隧道建立 (20s) ..."
          sleep 20

          # 打印完整日志（便于排错）
          echo "===== ADB 隧道日志 ====="
          cat adb-tunnel.log
          echo "===== VNC 隧道日志 ====="
          cat vnc-tunnel.log

          # 提取域名（完整子域名）
          ADB_HOST=$(grep -oP 'trycloudflare\.com/[a-zA-Z0-9.-]+' adb-tunnel.log | head -1 | sed 's|trycloudflare\.com/||')
          VNC_HOST=$(grep -oP 'trycloudflare\.com/[a-zA-Z0-9.-]+' vnc-tunnel.log | head -1 | sed 's|trycloudflare\.com/||')

          if [ -n "$ADB_HOST" ]; then
            echo "📱 ADB 连接命令: adb connect ${ADB_HOST}:443"
          else
            echo "❌ ADB 隧道域名提取失败，请查看上方日志。"
          fi

          if [ -n "$VNC_HOST" ]; then
            echo "🖥️  VNC 连接地址: ${VNC_HOST}:443 (无密码)"
            echo "   您可以使用 VNC 客户端连接，或稍后在浏览器中通过 noVNC 访问。"
          else
            echo "❌ VNC 隧道域名提取失败，请查看上方日志。"
          fi

          echo "=========================================="
          echo "实例将保持运行 6 小时，请尽快使用。"
          sleep 21600
