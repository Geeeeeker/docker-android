name: ARM64 Android 云手机 (Linux ARM - 已修复)

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 360

    steps:
      - name: 安装 Java (sdkmanager 必需)
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-arm64" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH

      - name: 启动 Android 模拟器 (ARM64)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: arm64-v8a
          target: google_apis
          profile: pixel_4
          disable-linux-hw-accel: true
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -no-audio
            -no-boot-anim
            -netdelay none
            -netspeed full
          script: |
            echo "模拟器已启动，配置远程桌面和隧道..."
            adb wait-for-device

            # 1. 安装 scrcpy（提供 VNC）
            sudo apt update
            sudo apt install -y scrcpy
            scrcpy --vnc --vnc-addr=0.0.0.0:5900 --no-audio --no-window &
            sleep 5

            # 2. 安装 noVNC + websockify
            sudo apt install -y novnc python3-websockify
            websockify --web /usr/share/novnc 6080 localhost:5900 &
            sleep 3

            # 3. 安装 cloudflared (ARM64)
            curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
            chmod +x cloudflared
            sudo mv cloudflared /usr/local/bin/

            # 4. 启动隧道
            nohup cloudflared tunnel --url tcp://localhost:5555 > adb-tunnel.log 2>&1 &
            nohup cloudflared tunnel --url http://localhost:6080 > vnc-tunnel.log 2>&1 &
            sleep 15

            # 5. 提取公网域名
            ADB_HOST=$(grep -oP 'trycloudflare\.com\S+' adb-tunnel.log | head -1)
            VNC_HOST=$(grep -oP '(?<=https://)[^ ]+\.trycloudflare\.com' vnc-tunnel.log | head -1)

            echo "=========================================="
            if [ -n "$ADB_HOST" ]; then
              echo "📱 ADB 连接命令: adb connect ${ADB_HOST}:443"
            else
              echo "❌ ADB 隧道失败，查看 adb-tunnel.log："
              cat adb-tunnel.log
            fi
            if [ -n "$VNC_HOST" ]; then
              echo "🌐 浏览器桌面地址: https://${VNC_HOST}"
            else
              echo "❌ 桌面隧道失败，查看 vnc-tunnel.log："
              cat vnc-tunnel.log
            fi
            echo "=========================================="
            echo "实例保持运行 6 小时。"

            sleep 21600
