name: QEMU LineageOS 云手机 (VNC + 浏览器桌面)

on:
  workflow_dispatch:

jobs:
  qemu-android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y qemu-system-arm qemu-utils unzip wget novnc websockify python3-websockify

      - name: 下载并准备 LineageOS 镜像
        run: |
          mkdir -p ~/lineage-images && cd ~/lineage-images
          wget -q https://github.com/jqssun/android-lineage-qemu/releases/download/v2026.03.18/UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          unzip -q UTM-VM-lineage-23.2-20260318-jqssun-virtio_arm64only.zip
          DATA_DIR=$(find . -type d -name "Data" | head -1)
          VDA=$(find $DATA_DIR -type f -name "vda.qcow2" | head -1)
          VDB=$(find $DATA_DIR -type f -name "vdb.qcow2" | head -1)
          cp "$VDA" system.qcow2
          cp "$VDB" data.qcow2
          echo "镜像就绪："
          ls -lh system.qcow2 data.qcow2

      - name: 启动 QEMU (ADB 5555, VNC 5900)
        run: |
          cd ~/lineage-images
          qemu-system-aarch64 \
            -M virt -cpu max -m 4096 -smp 4 \
            -drive file=system.qcow2,format=qcow2,if=virtio,index=0 \
            -drive file=data.qcow2,format=qcow2,if=virtio,index=1 \
            -nic user,hostfwd=tcp::5555-:5555 \
            -vnc :0 \
            -daemonize
          echo "QEMU 已启动，等待 Android 启动 (180s)..."
          sleep 180
          sudo ss -tlnp | grep -E '5555|5900'

      - name: 启动 noVNC 并建立隧道
        run: |
          # noVNC 将 VNC 5900 转成 WebSocket 6080（HTTP 可浏览器打开）
          websockify --web /usr/share/novnc 6080 localhost:5900 &

          # 安装 cloudflared
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          # ADB 隧道 (TCP)
          nohup cloudflared tunnel --url tcp://localhost:5555 > adb-tunnel.log 2>&1 &
          # noVNC 隧道 (HTTP，浏览器直接打开)
          nohup cloudflared tunnel --url http://localhost:6080 > novnc-tunnel.log 2>&1 &

          sleep 20

          # 提取域名
          ADB_HOST=$(grep -oP 'https?://\K[^\s]+\.trycloudflare\.com' adb-tunnel.log | head -1)
          NOVNC_HOST=$(grep -oP 'https?://\K[^\s]+\.trycloudflare\.com' novnc-tunnel.log | head -1)

          echo "=========================================="
          echo "📱 ADB 连接：  adb connect ${ADB_HOST}:443"
          echo "🌐 浏览器桌面： https://${NOVNC_HOST}"
          echo "=========================================="
          echo "实例保持运行 6 小时"
          sleep 21600
