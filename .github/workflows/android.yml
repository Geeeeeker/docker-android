name: Docker-Android 云手机 (完整配置版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0'
        options:
          - '9.0'
          - '10.0'
          - '11.0'
          - '12.0'
          - '13.0'
          - '14.0'
      device_model:
        description: '手机型号'
        required: true
        type: choice
        default: 'Samsung Galaxy S10'
        options:
          - 'Samsung Galaxy S10'
          - 'Samsung Galaxy S9'
          - 'Samsung Galaxy S8'
          - 'Samsung Galaxy S7 Edge'
          - 'Samsung Galaxy S7'
          - 'Samsung Galaxy S6'
          - 'Nexus 4'
          - 'Nexus 5'
          - 'Nexus One'
          - 'Nexus S'
          - 'Nexus 7'
          - 'Pixel C'
      screen_width:
        description: '屏幕宽度 (px)'
        required: true
        default: '1080'
      screen_height:
        description: '屏幕高度 (px)'
        required: true
        default: '1920'
      dpi:
        description: '屏幕DPI'
        required: true
        default: '420'
      root_mode:
        description: 'Root 权限 (仅pro版支持，普通版无效)'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'without-root'
          - 'with-root'
      enable_adb:
        description: '开启 ADB 外部调试'
        required: true
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 启用 KVM 加速
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger
          sudo chmod 666 /dev/kvm

      - name: 启动 Docker-Android 容器
        run: |
          # 基础端口（Web UI）
          PORTS="-p 6080:6080"
          
          # 可选 ADB 端口
          if [ "${{ github.event.inputs.enable_adb }}" == "true" ]; then
            PORTS="$PORTS -p 5554:5554 -p 5555:5555"
          fi
          
          # 可选 Root（普通版无效，仅保留参数占位）
          ROOT_ENV=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            echo "⚠️ 普通版 docker-android 不支持 root，容器将以非 root 运行"
          fi
          
          # 启动容器
          docker run -d \
            $PORTS \
            -e EMULATOR_DEVICE="${{ github.event.inputs.device_model }}" \
            -e WEB_VNC=true \
            -e EMULATOR_ADDITIONAL_ARGS="-screen ${{ github.event.inputs.screen_width }}x${{ github.event.inputs.screen_height }} -dpi-device ${{ github.event.inputs.dpi }}" \
            --device /dev/kvm \
            --name android-container \
            budtmo/docker-android:emulator_${{ github.event.inputs.android_version }}
          
          echo "等待模拟器初始化..."
          sleep 15

      - name: 安装并启动 Cloudflared 隧道
        run: |
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          nohup cloudflared tunnel --url http://localhost:6080 > cf.log 2>&1 &
          sleep 15
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          echo "CF_URL=$CF_URL" >> $GITHUB_ENV

      - name: 输出访问信息
        run: |
          echo "=========================================="
          echo "✅ Docker-Android 部署成功！"
          echo "🔗 公网访问地址: ${{ env.CF_URL }}"
          if [ "${{ github.event.inputs.enable_adb }}" == "true" ]; then
            echo "📱 ADB 连接命令: adb connect localhost:5555"
          fi
          echo "⚠️  手机型号可能显示为 generic_x86_64，但分辨率/DPI已按设置生效"
          echo "=========================================="
          echo "容器将保持运行 6 小时"
          sleep 21600
