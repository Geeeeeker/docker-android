name: Docker-Android 云手机 (完整配置版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0'
        options:
          - '9.0'
          - '10.0'
          - '11.0'
          - '12.0'
          - '13.0'
          - '14.0'
      device_model:
        description: '手机型号'
        required: true
        type: choice
        default: 'Samsung Galaxy S10'
        options:
          - 'Samsung Galaxy S10'
          - 'Samsung Galaxy S9'
          - 'Samsung Galaxy S8'
          - 'Samsung Galaxy S7 Edge'
          - 'Samsung Galaxy S7'
          - 'Samsung Galaxy S6'
          - 'Nexus 4'
          - 'Nexus 5'
          - 'Nexus One'
          - 'Nexus S'
          - 'Nexus 7'
          - 'Pixel C'
      screen_width:
        description: '屏幕宽度 (px)'
        required: true
        default: '1080'
      screen_height:
        description: '屏幕高度 (px)'
        required: true
        default: '1920'
      dpi:
        description: '屏幕DPI'
        required: true
        default: '420'
      root_mode:
        description: 'Root 权限'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'without-root'
          - 'with-root'
      enable_adb:
        description: '开启 ADB 外部调试'
        required: true
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 启用 KVM 加速
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger
          sudo chmod 666 /dev/kvm

      - name: 启动 Docker-Android 容器
        run: |
          # 组装基础环境变量
          ENV_VARS=(
            "-e EMULATOR_DEVICE=\"${{ github.event.inputs.device_model }}\""
            "-e WEB_VNC=true"
            "-e EMULATOR_ADDITIONAL_ARGS=\"-screen ${SCREEN_WIDTH}x${SCREEN_HEIGHT} -dpi-device ${DPI}\""
          )

          # 组装端口映射
          PORT_MAPPINGS=(
            "-p 6080:6080"   # Web UI
          )

          # 根据输入参数决定是否开启 ADB 端口映射
          if [ "${{ github.event.inputs.enable_adb }}" == "true" ]; then
            PORT_MAPPINGS+=("-p 5554:5554" "-p 5555:5555")
          fi

          # 组装 Docker 运行命令并执行
          docker run -d \
            "${PORT_MAPPINGS[@]}" \
            "${ENV_VARS[@]}" \
            --device /dev/kvm \
            --name android-container \
            budtmo/docker-android:emulator_${{ github.event.inputs.android_version }}

      # ... (后续的隧道、监控步骤保持不变)
