name: ARM64 Android 云手机 (macOS + noVNC)

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: macos-14   # Apple Silicon，原生 ARM64，硬件加速
    timeout-minutes: 360

    steps:
      - name: 准备 Android SDK 和模拟器
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: arm64-v8a
          target: google_apis
          profile: pixel_4
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -no-audio
            -no-boot-anim
            -netdelay none
            -netspeed full
            -vnc :0
          script: |
            echo "模拟器已通过 VNC 在 5900 端口提供画面"

            # 1. 安装 noVNC + websockify
            brew install novnc
            pip3 install websockify

            # 2. 启动 noVNC 代理 (VNC 5900 → websocket 6080)
            websockify --web /usr/local/share/novnc 6080 localhost:5900 &
            sleep 3

            # 3. 安装 cloudflared
            curl -L -o cloudflared.pkg https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64.pkg
            sudo installer -pkg cloudflared.pkg -target /

            # 4. 启动两条隧道：
            #    - ADB 端口（5555）→ TCP 公网地址
            #    - noVNC 端口（6080）→ HTTP 公网地址
            nohup cloudflared tunnel --url tcp://localhost:5555 > adb-tunnel.log 2>&1 &
            nohup cloudflared tunnel --url http://localhost:6080 > vnc-tunnel.log 2>&1 &
            sleep 15

            # 5. 提取公网域名
            ADB_HOST=$(grep -oP '(?<=trycloudflare\.com)[^\s]*' adb-tunnel.log | head -1)
            VNC_HOST=$(grep -oP '(?<=https://)[^ ]+\.trycloudflare\.com' vnc-tunnel.log | head -1)

            if [ -z "$ADB_HOST" ]; then
              echo "❌ 无法获取 ADB 隧道域名，查看 adb-tunnel.log："
              cat adb-tunnel.log
            else
              echo "✅ ADB 连接命令: adb connect ${ADB_HOST}:443"
            fi

            if [ -z "$VNC_HOST" ]; then
              echo "❌ 无法获取 VNC 隧道域名，查看 vnc-tunnel.log："
              cat vnc-tunnel.log
            else
              echo "✅ 浏览器桌面地址: https://${VNC_HOST}"
            fi

            echo "=========================================="
            echo "容器将保持运行 6 小时，请尽快使用。"
            echo "=========================================="

            # 保持脚本不退出，避免模拟器被终止
            sleep 21600
